services:
  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      # LM Studio is running on the host. On Windows/macOS, host.docker.internal resolves to the host machine.
      LM_STUDIO_BASE_URL: "${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}"
      LM_STUDIO_EMBEDDING_MODEL: "${LM_STUDIO_EMBEDDING_MODEL:-text-embedding-mxbai-embed-large-v1}"
      LM_STUDIO_MODEL: "${LM_STUDIO_MODEL:-qwen2.5-7b-instruct-uncensored}"
      LM_STUDIO_TIMEOUT_SECONDS: "${LM_STUDIO_TIMEOUT_SECONDS:-300}"
      LM_STUDIO_EMBEDDING_BATCH_SIZE: "${LM_STUDIO_EMBEDDING_BATCH_SIZE:-1}"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - rag-api

volumes:
  open_webui_data:
  qdrant_storage:
