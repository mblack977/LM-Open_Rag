services:
  qdrant:
    image: qdrant/qdrant:v1.9.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  rag-api:
    build: .
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      SUPABASE_URL: "${SUPABASE_URL:-http://host.docker.internal:8000}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      DROP_FOLDER_PATH: "${DROP_FOLDER_PATH:-/herb_files}"
      # Ollama for embeddings and LLM
      LM_STUDIO_BASE_URL: "${LM_STUDIO_BASE_URL:-http://ollama:11434/v1}"
      LM_STUDIO_EMBEDDING_MODEL: "${LM_STUDIO_EMBEDDING_MODEL:-mxbai-embed-large}"
      LM_STUDIO_MODEL: "${LM_STUDIO_MODEL:-qwen2.5:7b}"
      LM_STUDIO_TIMEOUT_SECONDS: "${LM_STUDIO_TIMEOUT_SECONDS:-300}"
      LM_STUDIO_EMBEDDING_BATCH_SIZE: "${LM_STUDIO_EMBEDDING_BATCH_SIZE:-16}"
    volumes:
      - ./data:/app/data
      - "C:/HerbData/Herb_files:/herb_files"
    depends_on:
      - qdrant
      - ollama

volumes:
  qdrant_storage:
  ollama_data:
