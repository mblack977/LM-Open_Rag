<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local RAG</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar__header">
        <div class="brand">Local RAG</div>
      </div>

      <div class="sidebar__section">
        <div class="label">Collection (topic)</div>
        <div class="row">
          <select id="collectionSelect" class="select"></select>
          <button id="refreshCollections" class="btn btn--ghost" title="Refresh">↻</button>
        </div>
        <div class="row">
          <input id="newCollection" class="input" placeholder="New collection name" />
          <button id="useNewCollection" class="btn">Use</button>
        </div>
        <div class="hint">Collections map to Qdrant collections (e.g. MTSS).</div>
      </div>

      <div class="sidebar__section">
        <div class="label">Upload file to selected collection</div>
        <form id="uploadForm" class="upload">
          <input id="fileInput" type="file" class="file" />
          <button class="btn" type="submit">Upload & Index</button>
        </form>
        <div id="uploadStatus" class="status"></div>
        <div id="uploadProgressWrap" class="progress" style="display:none;">
          <div class="progress__row">
            <div id="uploadProgressText" class="progress__text"></div>
            <div id="uploadProgressPct" class="progress__pct"></div>
          </div>
          <div class="progress__bar">
            <div id="uploadProgressBar" class="progress__barFill" style="width:0%;"></div>
          </div>
          <div id="uploadLogs" class="logs"></div>
        </div>
      </div>

      <div class="sidebar__section">
        <div class="label">Documents</div>
        <button id="loadDocs" class="btn btn--ghost">Load documents</button>
        <div id="docs" class="docs"></div>
      </div>

      <div class="sidebar__footer">
        <div class="pill">Qdrant: http://localhost:6333</div>
        <div class="pill">LM Studio: http://localhost:1234/v1</div>
      </div>
    </aside>

    <main class="chat">
      <div class="chat__header">
        <div class="chat__title">Chat</div>
        <div id="activeCollection" class="chat__subtitle"></div>
      </div>

      <div id="messages" class="messages"></div>

      <form id="chatForm" class="composer">
        <textarea id="chatInput" class="composer__input" placeholder="Ask a question..." rows="2"></textarea>
        <button id="sendBtn" class="btn composer__send" type="submit">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
